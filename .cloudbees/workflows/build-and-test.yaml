apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: BCBS AZ Standard Release
on:
  workflow_dispatch:
    inputs:
      manifest:
        type: string
        required: true
        description: |
          System-generated manifest parameter required for application releases. See https://docs.cloudbees.com/docs/cloudbees-platform/latest/applications/releases#manifest
      app-name:
        type: string
        required: true
        default: bcbs-az-claims-api
        description: Application name being released
      sem-ver:
        type: string
        required: true
        default: 1.0.0
        description: "Semantic version for this release (e.g. 2.4.1)"
metadata:
  stages/v1alpha1:
    - name: Release Readiness
      jobs:
        - create-jira-issue
        - quality-gate
        - approval
    - name: DEV
      jobs:
        - deploy-to-dev
        - configure-flags-dev
        - run-tests-dev
    - name: QA
      jobs:
        - deploy-to-QA
        - configure-flags-qa
        - run-tests-qa
        - exit-criteria-qa
    - name: Pre-Impl
      jobs:
        - release-manager-approval
        - servicenow-cr
    - name: PROD
      jobs:
        - deploy-to-Prod
        - configure-flags-prod
        - run-smoke-tests
    - name: Post-Impl
      jobs:
        - publish-release-summary
jobs:
  create-jira-issue:
    outputs:
      issue-key: ${{ steps.create-issue.outputs.issue-key }}
      issue-url: ${{ steps.create-issue.outputs.issue-url }}
    steps:
      - with:
          jira-url: ${{ secrets.JIRA_URL }}
          jira-username: ${{ secrets.JIRA_USERNAME }}
          jira-token: ${{ secrets.JIRA_TOKEN }}
          project-key: UDEMO
          issue-type: Task
          issue-fields: 'summary: "Release ${{ inputs.app-name }} v${{ inputs.sem-ver }}"'
        uses: https://github.com/cloudbees-days/jira-create-issue
        id: create-issue
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🎫 Release Ticket Created

            | Field | Value |
            |-------|-------|
            | Issue | ${{ steps.create-issue.outputs.issue-key }} |
            | Summary | Release ${{ inputs.app-name }} v${{ inputs.sem-ver }} |
            | Type | Release Task |
            | Project | UDEMO — BCBS AZ Claims Platform |
            | Priority | High |
            | Assignee | Release Engineering |
            | Sprint | Sprint 47 |
            | URL | ${{ steps.create-issue.outputs.issue-url }} |

            **Application:** `${{ inputs.app-name }}` | **Version:** `v${{ inputs.sem-ver }}` | **Run:** #${{ cloudbees.run_number }}

            ### 📦 Components in Release
            | Component | Repository | Image | Target Envs |
            |-----------|-----------|-------|-------------|
            | bcbs-az-claims-api | cb-golden-demo-org/hackers-organized-oct | cloudbeesdemo/hackers-organized | DEV → QA → PROD |
            | bcbs-az-member-portal | shozab-unify-examples/bcbs-az-member-portal | cloudbeesdemo/bcbs-az-member-portal | DEV → QA → PROD |
            | bcbs-az-eligibility-svc | shozab-unify-examples/bcbs-az-eligibility-svc | cloudbeesdemo/bcbs-az-eligibility-svc | DEV → QA → PROD |

            **3 services, 3 container images** | **Target environments:** DEV → QA → PROD
          format: MARKDOWN
  quality-gate:
    needs: create-jira-issue
    steps:
      - name: Checkout component
        uses: cloudbees-io/checkout@v1
        with:
          repository: cb-golden-demo-org/hackers-organized-oct
      - name: SonarQube SAST
        kind: scan
        uses: cloudbees-io/sonarqube-bundled-sast-scan-code@v1
        continue-on-error: true
        with:
          language: LANGUAGE_JS
      - name: Snyk SCA
        kind: scan
        uses: cloudbees-io/snyk-sca-scan-dependency@v1
        continue-on-error: true
        with:
          orgname: ${{ secrets.SNYK_ORGNAME }}
          token: ${{ secrets.SNYK_TOKEN }}
          language: LANGUAGE_JS
      - name: Publish quality gate evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🔍 Quality Gate — ✅ PASSED

            **Application:** `${{ inputs.app-name }}` | **Version:** `v${{ inputs.sem-ver }}`

            ### 🛡️ SonarQube SAST
            | Metric | Value | Threshold | Status |
            |--------|-------|-----------|--------|
            | Critical Issues | 0 | 0 | ✅ Pass |
            | High Issues | 0 | 0 | ✅ Pass |
            | Medium Issues | 2 | ≤ 5 | ✅ Pass |
            | Low Issues | 7 | ≤ 20 | ✅ Pass |
            | Code Coverage | 84.3% | ≥ 80% | ✅ Pass |
            | Code Duplication | 1.2% | ≤ 3% | ✅ Pass |
            | Technical Debt | 2h 15m | ≤ 8h | ✅ Pass |

            ### 📦 Snyk SCA
            | Severity | Count | Auto-Fixed | Status |
            |----------|-------|------------|--------|
            | Critical | 0 | — | ✅ Pass |
            | High | 0 | — | ✅ Pass |
            | Medium | 3 | 3 | ✅ Pass |
            | Low | 11 | 8 | ✅ Pass |

            **247 dependencies scanned** | 0 license violations

            ### 📋 Gate Summary
            | Check | Result |
            |-------|--------|
            | 🎫 Jira Issue | ${{ needs.create-jira-issue.outputs.issue-key }} |
            | 🛡️ SonarQube SAST | ✅ Passed — 0 critical/high |
            | 📦 Snyk SCA | ✅ Passed — 0 critical/high |
            | **Overall** | **✅ APPROVED TO PROCEED** |
          format: MARKDOWN
  approval:
    needs: quality-gate
    timeout-minutes: 1440
    delegates: cloudbees-io/manual-approval/custom-job.yml@v1
    with:
      instructions: "Review quality gate for ${{ inputs.app-name }} v${{ inputs.sem-ver }} and approve to proceed to DEV deployment."
      disallowLaunchByUser: false
      notifyAllEligibleUsers: false
      approvers: 3ad0577a-e80d-11ea-a794-42010a83ae1a
  deploy-to-dev:
    needs: approval
    uses: ./.cloudbees/workflows/deploy.yaml
    with:
      manifest: ${{ inputs.manifest }}
      environment: bcbs-az-dev
    secrets: inherit
  configure-flags-dev:
    needs: deploy-to-dev
    environment: bcbs-az-dev
    steps:
      - name: Configure feature flags for DEV
        uses: docker://alpine:3.20
        run: |
          echo "============================================="
          echo "  Feature Flag Configuration — DEV"
          echo "  App: BCBS AZ Member Portal"
          echo "  Strategy: Full enablement (100% traffic)"
          echo "============================================="
          echo "[FLAGS] new-claims-submission-ui   → ENABLED  (100%)"
          echo "[FLAGS] member-portal-api-version  → v2       (100%)"
          echo "[FLAGS] real-time-eligibility-check → ENABLED (100%)"
          echo "[FLAGS] All 3 flags configured for DEV environment"
          echo "[FLAGS] A/B baseline established — full v2 exposure in DEV"
      - name: Publish flag configuration evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🚩 Feature Flag Configuration — DEV

            **Application:** `${{ inputs.app-name }}` | **Version:** `v${{ inputs.sem-ver }}`
            **Environment:** `bcbs-az-dev` | **Strategy:** Full enablement — validate all new features

            ### Flag States After Deployment
            | Flag | Type | DEV Value | Rollout | Purpose |
            |------|------|-----------|---------|---------|
            | `new-claims-submission-ui` | Boolean | ✅ **ENABLED** | 100% | New React claims form with auto-fill |
            | `member-portal-api-version` | String | `v2` | 100% | REST API v2 with real-time eligibility |
            | `real-time-eligibility-check` | Boolean | ✅ **ENABLED** | 100% | Live 270/271 EDI eligibility lookups |

            ### A/B Test Design
            | Group | Traffic Split | Experience |
            |-------|--------------|------------|
            | Group A (Control) | 0% in DEV | Legacy UI + API v1 |
            | Group B (Variant) | **100% in DEV** | New claims UI + API v2 + real-time eligibility |

            > 💡 DEV runs 100% variant to maximize coverage of new code paths before QA regression.

            **All flags configured via CloudBees Unify Feature Management** ✅
          format: MARKDOWN
  run-tests-dev:
    needs: configure-flags-dev
    environment: bcbs-az-dev
    steps:
      - name: DEV smoke tests
        kind: test
        uses: docker://alpine:3.20
        run: |
          echo "=== ${{ inputs.app-name }} v${{ inputs.sem-ver }} — DEV Smoke Tests ==="
          echo "Health Check              /api/v2/health            200  12ms  PASS"
          echo "Authentication            /api/v2/auth/token        200  89ms  PASS"
          echo "Claims Submission (new)   /api/v2/claims            201 134ms  PASS  [new-claims-submission-ui=ON]"
          echo "Claims Lookup             /api/v2/claims/{id}       200  67ms  PASS"
          echo "Member Eligibility (RT)   /api/v2/eligibility       200  48ms  PASS  [real-time-eligibility-check=ON]"
          echo "Provider Search           /api/v2/providers         200  55ms  PASS"
          echo "Benefit Summary           /api/v2/benefits/{id}     200  98ms  PASS"
          echo "=== 7/7 PASSED | Avg: 72ms | P99: 134ms ==="
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🧪 DEV Smoke Tests — ✅ PASSED

            **Application:** `${{ inputs.app-name }}` | **Version:** `v${{ inputs.sem-ver }}`
            **Environment:** `bcbs-az-dev` | **Duration:** 47s | **Run:** #${{ cloudbees.run_number }}

            | Test | Endpoint | HTTP | Latency | Flag Context | Result |
            |------|---------|------|---------|-------------|--------|
            | Health Check | /api/v2/health | 200 | 12ms | — | ✅ Pass |
            | Authentication | /api/v2/auth/token | 200 | 89ms | — | ✅ Pass |
            | Claims Submission | /api/v2/claims | 201 | 134ms | `new-claims-submission-ui=ON` | ✅ Pass |
            | Claims Lookup | /api/v2/claims/{id} | 200 | 67ms | `api-version=v2` | ✅ Pass |
            | Member Eligibility | /api/v2/eligibility | 200 | 48ms | `real-time-eligibility=ON` | ✅ Pass |
            | Provider Search | /api/v2/providers | 200 | 55ms | `api-version=v2` | ✅ Pass |
            | Benefit Summary | /api/v2/benefits/{memberId} | 200 | 98ms | — | ✅ Pass |

            **7/7 tests passed** | Avg latency: 72ms | P99: 134ms

            ### 🚩 Active Feature Flags in DEV
            | Flag | State | Coverage |
            |------|-------|---------|
            | `new-claims-submission-ui` | ✅ Enabled | 100% |
            | `member-portal-api-version` | `v2` | 100% |
            | `real-time-eligibility-check` | ✅ Enabled | 100% |

            ### 🏗️ Components Deployed to DEV
            | Component | Image Tag | Status |
            |-----------|-----------|--------|
            | bcbs-az-claims-api | cloudbeesdemo/hackers-organized | ✅ Running |
            | bcbs-az-member-portal | cloudbeesdemo/bcbs-az-member-portal | ✅ Running |
            | bcbs-az-eligibility-svc | cloudbeesdemo/bcbs-az-eligibility-svc | ✅ Running |
          format: MARKDOWN
  deploy-to-QA:
    needs: run-tests-dev
    uses: ./.cloudbees/workflows/deploy.yaml
    with:
      manifest: ${{ inputs.manifest }}
      environment: bcbs-az-qa
    secrets: inherit
  configure-flags-qa:
    needs: deploy-to-QA
    environment: bcbs-az-qa
    steps:
      - name: Configure feature flags for QA
        uses: docker://alpine:3.20
        run: |
          echo "============================================="
          echo "  Feature Flag Configuration — QA"
          echo "  App: BCBS AZ Member Portal"
          echo "  Strategy: Full enablement — regression validation"
          echo "============================================="
          echo "[FLAGS] new-claims-submission-ui    → ENABLED  (100%)"
          echo "[FLAGS] member-portal-api-version   → v2       (100%)"
          echo "[FLAGS] real-time-eligibility-check → ENABLED  (100%)"
          echo "[FLAGS] DEV flags promoted to QA — identical configuration"
          echo "[FLAGS] Ready for full regression suite against v2 API"
      - name: Publish flag configuration evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🚩 Feature Flag Configuration — QA

            **Application:** `${{ inputs.app-name }}` | **Version:** `v${{ inputs.sem-ver }}`
            **Environment:** `bcbs-az-qa` | **Strategy:** Full enablement — validate at scale before PROD

            ### Flag States After Deployment
            | Flag | Type | QA Value | Rollout | Validated in DEV |
            |------|------|----------|---------|-----------------|
            | `new-claims-submission-ui` | Boolean | ✅ **ENABLED** | 100% | ✅ Yes |
            | `member-portal-api-version` | String | `v2` | 100% | ✅ Yes |
            | `real-time-eligibility-check` | Boolean | ✅ **ENABLED** | 100% | ✅ Yes |

            ### Flag Promotion Path
            | Environment | `new-claims-submission-ui` | `member-portal-api-version` | `real-time-eligibility-check` |
            |-------------|--------------------------|----------------------------|-------------------------------|
            | DEV ✅ | Enabled (100%) | v2 | Enabled (100%) |
            | **QA** ➡️ | **Enabled (100%)** | **v2** | **Enabled (100%)** |
            | PROD 🔜 | Enabled (10% A/B) | v1 → v2 ramp | Enabled (25% canary) |

            > 💡 QA runs full regression against 100% variant traffic — this validates the new experience before the controlled PROD A/B rollout.

            **Flags promoted from DEV → QA automatically by release pipeline** ✅
          format: MARKDOWN
  run-tests-qa:
    needs: configure-flags-qa
    environment: bcbs-az-qa
    outputs:
      pass-rate: ${{ steps.run-tests.outputs.pass-rate }}
    steps:
      - name: QA regression suite
        id: run-tests
        kind: test
        uses: docker://alpine:3.20
        run: |
          PASS_RATE=98
          echo "${PASS_RATE}" >> $CLOUDBEES_OUTPUTS/pass-rate
          echo "=== ${{ inputs.app-name }} v${{ inputs.sem-ver }} — QA Regression Suite ==="
          echo "Claims Processing (v2 API)    38/38  PASS  (100%)  [new-claims-submission-ui=ON]"
          echo "Member Eligibility (RT)       27/27  PASS  (100%)  [real-time-eligibility-check=ON]"
          echo "Provider Directory            21/22  FAIL  (95.5%) - 1 flaky timeout"
          echo "Benefits & Coverage (v2)      19/19  PASS  (100%)  [api-version=v2]"
          echo "Auth & Authorization          14/14  PASS  (100%)"
          echo "Payments & EOB                 3/4   FAIL  (75%)   - PDF size limit"
          echo "=== 122/124 PASSED (${PASS_RATE}%) ==="
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🧪 QA Regression Suite — ✅ PASSED

            **Application:** `${{ inputs.app-name }}` | **Version:** `v${{ inputs.sem-ver }}`
            **Environment:** `bcbs-az-qa` | **Duration:** 8m 42s | **Run:** #${{ cloudbees.run_number }}

            ### Results by Module
            | Module | Total | Passed | Failed | Pass Rate | Flag Context |
            |--------|-------|--------|--------|-----------|-------------|
            | Claims Processing | 38 | 38 | 0 | ✅ 100% | `new-claims-submission-ui=ON` |
            | Member Eligibility | 27 | 27 | 0 | ✅ 100% | `real-time-eligibility=ON` |
            | Provider Directory | 22 | 21 | 1 | ⚠️ 95.5% | — |
            | Benefits & Coverage | 19 | 19 | 0 | ✅ 100% | `api-version=v2` |
            | Auth & Authorization | 14 | 14 | 0 | ✅ 100% | — |
            | Payments & EOB | 4 | 3 | 1 | ⚠️ 75% | — |
            | **Total** | **124** | **122** | **2** | **98.4%** | |

            ### Known Failures (Non-Blocking)
            | # | Test | Module | Notes |
            |---|------|--------|-------|
            | 1 | test_provider_npi_lookup_timeout | Provider Directory | Flaky — external NPI registry timeout (UDEMO-441) |
            | 2 | test_eob_pdf_generation_large | Payments & EOB | PDF > 10MB limit — backlog item (UDEMO-389) |

            **Pass rate: ${{ steps.run-tests.outputs.pass-rate }}%** (threshold: ≥ 95%) ✅

            ### 🚩 Active Feature Flags in QA
            | Flag | State | Coverage | A/B Group |
            |------|-------|---------|-----------|
            | `new-claims-submission-ui` | ✅ Enabled | 100% | All users — Variant B |
            | `member-portal-api-version` | `v2` | 100% | All users — Variant B |
            | `real-time-eligibility-check` | ✅ Enabled | 100% | All users — Variant B |

            ### 🏗️ Components Deployed to QA
            | Component | Image Tag | Status |
            |-----------|-----------|--------|
            | bcbs-az-claims-api | cloudbeesdemo/hackers-organized | ✅ Running |
            | bcbs-az-member-portal | cloudbeesdemo/bcbs-az-member-portal | ✅ Running |
            | bcbs-az-eligibility-svc | cloudbeesdemo/bcbs-az-eligibility-svc | ✅ Running |
          format: MARKDOWN
  exit-criteria-qa:
    needs: run-tests-qa
    environment: bcbs-az-qa
    steps:
      - name: Evaluate QA exit criteria
        uses: docker://alpine:3.20
        run: |
          PASS_RATE=${{ needs.run-tests-qa.outputs.pass-rate }}
          echo "Pass Rate: ${PASS_RATE}% (Required: >= 95%)"
          if [ "$PASS_RATE" -ge 95 ]; then
            echo "EXIT CRITERIA MET"
          else
            echo "EXIT CRITERIA NOT MET"; exit 1
          fi
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## ✅ QA Exit Criteria — ALL MET

            **Application:** `${{ inputs.app-name }}` | **Version:** `v${{ inputs.sem-ver }}`
            **Pass rate:** ${{ needs.run-tests-qa.outputs.pass-rate }}% (required ≥ 95%) ✅

            | Criterion | Requirement | Actual | Status |
            |-----------|------------|--------|--------|
            | Test Pass Rate | ≥ 95% | ${{ needs.run-tests-qa.outputs.pass-rate }}% | ✅ Met |
            | P1 Blockers | 0 | 0 | ✅ Met |
            | P2 Blockers | ≤ 2 | 0 | ✅ Met |
            | Critical / High Security Findings | 0 | 0 | ✅ Met |
            | Performance Regression | < 20% | +3.1% | ✅ Met |
            | Rollback Plan Documented | Required | Yes | ✅ Met |
            | Release Notes Approved | Required | Yes | ✅ Met |
            | Feature Flag Config Validated | Required | Yes | ✅ Met |

            ### 🚩 QA Feature Flag Sign-off
            | Flag | Validated | Sign-off |
            |------|-----------|---------|
            | `new-claims-submission-ui` | 38/38 claims tests passed | ✅ Ready for PROD A/B |
            | `member-portal-api-version` | v2 API regression clean | ✅ Ready for PROD canary |
            | `real-time-eligibility-check` | 27/27 eligibility tests passed | ✅ Ready for PROD rollout |

            **Decision: ✅ APPROVED FOR PRE-IMPL**
            All exit criteria satisfied. Flags validated — PROD A/B rollout plan confirmed.
          format: MARKDOWN
  release-manager-approval:
    needs: exit-criteria-qa
    timeout-minutes: 1440
    delegates: cloudbees-io/manual-approval/custom-job.yml@v1
    with:
      instructions: "QA exit criteria passed for ${{ inputs.app-name }} v${{ inputs.sem-ver }}. Approve to open ServiceNow CR and proceed to PROD A/B deployment."
      disallowLaunchByUser: false
  servicenow-cr:
    needs: release-manager-approval
    uses: ./.cloudbees/workflows/sn-approval.yaml
    with:
      app-name: ${{ inputs.app-name }}
      sem-ver: ${{ inputs.sem-ver }}
      run-number: ${{ cloudbees.run_number }}
    secrets: inherit
    vars: inherit
  deploy-to-Prod:
    needs: servicenow-cr
    uses: ./.cloudbees/workflows/deploy.yaml
    with:
      manifest: ${{ inputs.manifest }}
      environment: bcbs-az-prod
    secrets: inherit
  configure-flags-prod:
    needs: deploy-to-Prod
    environment: bcbs-az-prod
    steps:
      - name: Configure feature flags for PROD A/B test
        uses: docker://alpine:3.20
        run: |
          echo "============================================="
          echo "  Feature Flag Configuration — PROD"
          echo "  App: BCBS AZ Member Portal"
          echo "  Strategy: Controlled A/B rollout"
          echo "============================================="
          echo "[FLAGS] new-claims-submission-ui    → ENABLED   (10% — Group B)"
          echo "[FLAGS]                               DISABLED   (90% — Group A control)"
          echo "[FLAGS] member-portal-api-version   → v1        (90% — stable)"
          echo "[FLAGS]                               v2         (10% — canary)"
          echo "[FLAGS] real-time-eligibility-check → ENABLED   (25% — canary)"
          echo ""
          echo "[A/B] Group A (90%): Legacy UI + API v1 + standard eligibility"
          echo "[A/B] Group B (10%): New claims UI + API v2 + real-time eligibility"
          echo ""
          echo "[FLAGS] PROD A/B test active — monitoring conversion & error rates"
          echo "[FLAGS] Full ramp target: 50% after 72h if error rate < 0.1%"
      - name: Publish flag configuration evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🚩 Feature Flag Configuration — PROD A/B Test Active

            **Application:** `${{ inputs.app-name }}` | **Version:** `v${{ inputs.sem-ver }}`
            **Environment:** `bcbs-az-prod` | **Strategy:** Controlled A/B rollout — minimize blast radius

            ### 🔬 A/B Test Configuration
            | Group | Traffic | Users | Experience |
            |-------|---------|-------|------------|
            | **A — Control** | 90% | ~450,000 members | Legacy claims UI + API v1 + standard eligibility |
            | **B — Variant** | 10% | ~50,000 members | New claims UI + API v2 + real-time eligibility |

            ### Flag States in PROD
            | Flag | Type | Group A (90%) | Group B (10%) | Purpose |
            |------|------|--------------|--------------|---------|
            | `new-claims-submission-ui` | Boolean | ❌ Off | ✅ **On** | New React claims form with auto-fill & validation |
            | `member-portal-api-version` | String | `v1` | `v2` | REST API version serving the portal |
            | `real-time-eligibility-check` | Boolean | ❌ Off (75%) | ✅ **On** (25%) | Live 270/271 EDI real-time eligibility |

            ### Ramp Schedule
            | Phase | Traffic (Group B) | Trigger Condition | Target Date |
            |-------|------------------|-------------------|-------------|
            | Initial rollout | 10% | Deploy complete | Now |
            | Phase 2 | 25% | Error rate < 0.1% for 24h | +24h |
            | Phase 3 | 50% | Error rate < 0.1% for 48h | +72h |
            | Full rollout | 100% | No P1 issues, conversion uplift > 5% | +7d |

            ### Rollback Plan
            | Trigger | Action | SLA |
            |---------|--------|-----|
            | Error rate > 0.5% | Disable `new-claims-submission-ui` | < 2 min |
            | P99 latency > 500ms | Revert `member-portal-api-version` to v1 | < 2 min |
            | P1 incident | Disable all 3 flags → 100% Group A | < 5 min |

            > 🛡️ All flag changes are instant and require no re-deployment. Rollback is a single toggle in CloudBees Unify Feature Management.

            **PROD A/B test initialized** ✅ Monitoring active — Datadog dashboard: `bcbs-az/feature-flags/ab-test-v${{ inputs.sem-ver }}`
          format: MARKDOWN
  run-smoke-tests:
    needs: configure-flags-prod
    environment: bcbs-az-prod
    steps:
      - name: PROD smoke tests
        kind: test
        uses: docker://alpine:3.20
        run: |
          echo "=== ${{ inputs.app-name }} v${{ inputs.sem-ver }} — PROD Smoke Tests ==="
          echo "--- Group A (Control — 90% traffic) ---"
          echo "Health Check         /api/v1/health           200   9ms  PASS"
          echo "Authentication       /api/v1/auth/token       200  71ms  PASS"
          echo "Claims Submit (v1)   /api/v1/claims           201 118ms  PASS"
          echo "Claims Lookup        /api/v1/claims/{id}      200  54ms  PASS"
          echo "Member Eligibility   /api/v1/eligibility      200 103ms  PASS"
          echo "Provider Search      /api/v1/providers        200  48ms  PASS"
          echo "--- Group B (Variant — 10% traffic) ---"
          echo "Claims Submit (new)  /api/v2/claims           201  97ms  PASS  [new-claims-submission-ui=ON]"
          echo "Eligibility (RT)     /api/v2/eligibility      200  41ms  PASS  [real-time-eligibility=ON]"
          echo "=== 8/8 PASSED | Group A avg: 67ms | Group B avg: 69ms ==="
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🚀 PROD Smoke Tests — ✅ PASSED

            **Application:** `${{ inputs.app-name }}` | **Version:** `v${{ inputs.sem-ver }}`
            **Environment:** `bcbs-az-prod` | **Duration:** 1m 31s | **Run:** #${{ cloudbees.run_number }}

            ### Group A — Control (90% of traffic)
