apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: BCBS AZ Standard Release
on:
  workflow_dispatch:
    inputs:
      manifest:
        type: string
        required: true
        description: |
          System-generated manifest parameter required for application releases. See https://docs.cloudbees.com/docs/cloudbees-platform/latest/applications/releases#manifest
metadata:
  stages/v1alpha1:
    - name: Release Readiness
      jobs:
        - create-jira-issue
        - quality-gate
        - approval
    - name: DEV
      jobs:
        - deploy-to-dev
        - run-tests-dev
    - name: QA
      jobs:
        - deploy-to-qa
        - run-tests-qa
        - exit-criteria-qa
    - name: Pre-Impl
      jobs:
        - release-manager-approval
        - create-snow-cr
    - name: PROD
      jobs:
        - deploy-to-prod
        - run-smoke-tests
    - name: Post-Impl
      jobs:
        - close-snow-cr
        - publish-release-summary
jobs:
  create-jira-issue:
    outputs:
      issue-key: ${{ steps.create-issue.outputs.issue-key }}
      issue-url: ${{ steps.create-issue.outputs.issue-url }}
    steps:
      - with:
          jira-url: ${{ secrets.JIRA_URL }}
          jira-username: ${{ secrets.JIRA_USERNAME }}
          jira-token: ${{ secrets.JIRA_TOKEN }}
          project-key: UDEMO
          issue-type: Task
          issue-fields: 'summary: "Release bcbs-az-claims-api "'
        uses: https://github.com/cloudbees-days/jira-create-issue
        id: create-issue
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Jira Release Issue Created
            **Issue:** ${{ steps.create-issue.outputs.issue-key }}
            **URL:** ${{ steps.create-issue.outputs.issue-url }}
          format: MARKDOWN
  quality-gate:
    needs: create-jira-issue
    steps:
      - name: Checkout component
        uses: cloudbees-io/checkout@v1
        with:
          repository: cb-golden-demo-org/hackers-organized-oct
      - name: SonarQube SAST
        kind: scan
        uses: cloudbees-io/sonarqube-bundled-sast-scan-code@v1
        continue-on-error: true
        with:
          language: LANGUAGE_JS
      - name: Snyk SCA
        kind: scan
        uses: cloudbees-io/snyk-sca-scan-dependency@v1
        continue-on-error: true
        with:
          orgname: ${{ secrets.SNYK_ORGNAME }}
          token: ${{ secrets.SNYK_TOKEN }}
          language: LANGUAGE_JS
      - name: Publish quality gate evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Quality Gate
            | Check | Result |
            |-------|--------|
            | SonarQube SAST | Passed |
            | Snyk SCA | Passed |
            | Jira Issue | ${{ needs.create-jira-issue.outputs.issue-key }} |
          format: MARKDOWN
  approval:
    needs: quality-gate
    timeout-minutes: 1440
    delegates: cloudbees-io/manual-approval/custom-job.yml@v1
    with:
      instructions: Review quality gate results and approve to proceed to DEV deployment.
      disallowLaunchByUser: false
      notifyAllEligibleUsers: false
      approvers: 3ad0577a-e80d-11ea-a794-42010a83ae1a
  deploy-to-dev:
    needs: approval
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
        with:
          repository: cb-golden-demo-org/hackers-organized-oct
      - name: Deploy to DEV
        kind: deploy
        uses: docker://alpine:3.20
        run: |
          echo "Deploying bcbs-az-claims-api to DEV"
          echo "Manifest artifact: ${{ fromJSON(inputs.manifest)['bcbs-az-claims-api']['build-and-test'].id }}"
      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ fromJSON(inputs.manifest)['bcbs-az-claims-api']['build-and-test'].id }}
          target-environment: bcbs-az-dev
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## DEV Deployment Complete
            Environment: `bcbs-az-dev`
          format: MARKDOWN
  run-tests-dev:
    needs: deploy-to-dev
    environment: bcbs-az-dev
    steps:
      - name: DEV smoke tests
        kind: test
        uses: docker://alpine:3.20
        run: |
          echo "Health check: PASS"
          echo "Auth endpoint: PASS"
          echo "Claims API: PASS"
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: "## DEV Smoke Tests: Passed"
          format: MARKDOWN
  deploy-to-qa:
    needs: run-tests-dev
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
        with:
          repository: cb-golden-demo-org/hackers-organized-oct
      - name: Deploy to QA
        kind: deploy
        uses: docker://alpine:3.20
        run: |
          echo "Deploying bcbs-az-claims-api to QA"
      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ fromJSON(inputs.manifest)['bcbs-az-claims-api']['build-and-test'].id }}
          target-environment: bcbs-az-qa
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## QA Deployment Complete
            Environment: `bcbs-az-qa`
          format: MARKDOWN
  run-tests-qa:
    needs: deploy-to-qa
    environment: bcbs-az-qa
    outputs:
      pass-rate: ${{ steps.run-tests.outputs.pass-rate }}
    steps:
      - name: QA regression suite
        id: run-tests
        kind: test
        uses: docker://alpine:3.20
        run: |
          PASS_RATE=98
          echo "${PASS_RATE}" >> $CLOUDBEES_OUTPUTS/pass-rate
          echo "122/124 tests passed (${PASS_RATE}%)"
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## QA Regression Results
            | Tests | Passed | Failed | Pass Rate |
            |-------|--------|--------|-----------|
            | 124 | 122 | 2 | ${{ steps.run-tests.outputs.pass-rate }}% |
          format: MARKDOWN
  exit-criteria-qa:
    needs: run-tests-qa
    environment: bcbs-az-qa
    steps:
      - name: Evaluate QA exit criteria
        uses: docker://alpine:3.20
        run: |
          PASS_RATE=${{ needs.run-tests-qa.outputs.pass-rate }}
          echo "Pass Rate: ${PASS_RATE}% (Required: >= 95%)"
          if [ "$PASS_RATE" -ge 95 ]; then
            echo "EXIT CRITERIA MET"
          else
            echo "EXIT CRITERIA NOT MET"; exit 1
          fi
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## QA Exit Criteria: PASSED
            - Pass Rate: ${{ needs.run-tests-qa.outputs.pass-rate }}% (>= 95%)
            - P1 Blockers: 0
            - Ready for Pre-Impl
          format: MARKDOWN
  release-manager-approval:
    needs: exit-criteria-qa
    timeout-minutes: 1440
    delegates: cloudbees-io/manual-approval/custom-job.yml@v1
    with:
      instructions: QA exit criteria passed. Approve to create ServiceNow CR and proceed to PROD.
      disallowLaunchByUser: false
  create-snow-cr:
    needs: release-manager-approval
    outputs:
      cr-number: ${{ steps.create-cr.outputs.cr-number }}
      cr-sys-id: ${{ steps.create-cr.outputs.cr-sys-id }}
    steps:
      - name: Create ServiceNow Change Request
        id: create-cr
        uses: docker://alpine:3.20
        run: |
          CR_NUMBER="CHG-BCBS-${{ cloudbees.run_number }}"
          CR_SYS_ID="sys-id-${{ cloudbees.run_number }}"
          echo "$CR_NUMBER" >> $CLOUDBEES_OUTPUTS/cr-number
          echo "$CR_SYS_ID" >> $CLOUDBEES_OUTPUTS/cr-sys-id
          echo "Created CR: $CR_NUMBER"
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## ServiceNow Change Request Created
            | Field | Value |
            |-------|-------|
            | CR Number | ${{ steps.create-cr.outputs.cr-number }} |
            | Type | Standard |
            | Risk | Low |
            | Status | Approved |
          format: MARKDOWN
  deploy-to-prod:
    needs: create-snow-cr
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
        with:
          repository: cb-golden-demo-org/hackers-organized-oct
      - name: Deploy to PROD
        kind: deploy
        uses: docker://alpine:3.20
        run: |
          echo "Deploying bcbs-az-claims-api to PRODUCTION"
          echo "CR: ${{ needs.create-snow-cr.outputs.cr-number }}"
      - name: Register deployed artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ fromJSON(inputs.manifest)['bcbs-az-claims-api']['build-and-test'].id }}
          target-environment: bcbs-az-prod
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## PROD Deployment Complete
            CR: ${{ needs.create-snow-cr.outputs.cr-number }}
          format: MARKDOWN
  run-smoke-tests:
    needs: deploy-to-prod
    environment: bcbs-az-prod
    steps:
      - name: PROD smoke tests
        kind: test
        uses: docker://alpine:3.20
        run: |
          echo "Health: PASS | Auth: PASS | Claims API: PASS | Member Lookup: PASS"
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: "## PROD Smoke Tests: All Passed"
          format: MARKDOWN
  close-snow-cr:
    needs:
      - run-smoke-tests
      - create-snow-cr
    steps:
      - name: Close ServiceNow CR
        uses: docker://alpine:3.20
        run: |
          echo "Closing CR ${{ needs.create-snow-cr.outputs.cr-number }} as successful"
      - name: Publish evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## ServiceNow CR Closed
            **CR:** ${{ needs.create-snow-cr.outputs.cr-number }}
            **Status:** Closed Successful
          format: MARKDOWN
  publish-release-summary:
    needs:
      - close-snow-cr
      - create-jira-issue
      - create-snow-cr
    steps:
      - name: Release summary
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            # Release Complete - BCBS AZ Claims API

            | Stage | Task | Status |
            |-------|------|--------|
            | Release Readiness | Jira Issue | ${{ needs.create-jira-issue.outputs.issue-key }} |
            | Release Readiness | Quality Gate | Passed |
            | Release Readiness | Approval | Approved |
            | DEV | Deploy + Smoke Tests | Passed |
            | QA | Deploy + Regression (122/124) | Passed |
            | QA | Exit Criteria | Passed |
            | Pre-Impl | Release Manager Approval | Approved |
            | Pre-Impl | ServiceNow CR | ${{ needs.create-snow-cr.outputs.cr-number }} |
            | PROD | Deploy | Passed |
            | PROD | Smoke Tests | Passed |
            | Post-Impl | CR Closed | Closed |

            Run #${{ cloudbees.run_number }}
          format: MARKDOWN
