apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: deployer
on:
  workflow_call:
    inputs:
      manifest:
        type: string
        required: true
      environment:
        type: string
        required: true
jobs:
  bcbs-az-claims-api:
    if: ${{ fromJSON(inputs.manifest)['bcbs-az-claims-api']['index.docker.io/cloudbeesdemo/hackers-organized'].deploy }}
    uses: cb-golden-demo-org/hackers-organized-oct/.cloudbees/workflows/deploy.yaml
    with:
      artifact-url: ${{ fromJSON(inputs.manifest)['bcbs-az-claims-api']['index.docker.io/cloudbeesdemo/hackers-organized'].url }}
      artifact-id: ${{ fromJSON(inputs.manifest)['bcbs-az-claims-api']['index.docker.io/cloudbeesdemo/hackers-organized'].id }}
      environment: ${{ inputs.environment }}
    secrets: inherit
    vars: inherit
